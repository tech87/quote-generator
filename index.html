<!DOCTYPE html>
<html>
    <head>
        <title>Quote Gen</title>
        <link rel="stylesheet" href="style.css">
        <meta name='viewport' content="width=device-width, initial-scale=1.0">
        <link href='https://fonts.googleapis.com/css?family=Roboto:400,700' rel='stylesheet' type='text/css'>
    </head>
    <body>
        <!--      -->
        <div class="container">
                <h1>Random quote generator</h1>
               <div id="content">
                   <div class='p1'>
                        <p id="text"></p>
                   </div>
                   <div class="p2">
                            <p id="text1"></p>
                            <p id="text2"></p>
                            <p id="text3"></p>
                            <p id="text4"></p>
                            <p id="text5"></p>
                    </div>  
                </div>
           </div>          
                <div class="wrapper">
                        <button class="button" onclick="genQuote()">Random quote</button>
                        <label for="quote">Types of Quotes : </label>
                        <select id="quoteAccess">
                                <option value='one' selected="selected">Succes</option>
                                <option value='two'>Dreams</option>
                        </select>
                        <label for="quoteNumber">Number of Quotes : </label>
                        <input id="quoteNumber" type="number" min="1" max="5" value="1">
                        <button class="button2" onclick="createQuote()">Generate Quotes</button>
                </div>
                
        <script src="javascript.js"></script>
        
    </body>
</html>
